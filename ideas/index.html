<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="4 domains · 16 venture pitches for Board/IC review — pre-decisional, cited hypotheses.">
<title>InnovArise — Explore: Venture Pitch Deck</title>
<style>
  :root{
    --ink:#10182a;
    --ink-2:#1b2436;
    --paper:#f7f6f3;
    --paper-2:#efece4;
    --slate:#5a6172;
    --slate-2:#878d9b;
    --hair:#dcdad3;
    --hair-2:#c9c6bd;
    --accent:#3f5e8c;
    --accent-deep:#2c466e;
    --accent-soft:#e7ecf4;
    --contra:#9a4a2f;
    --contra-soft:#f3e6df;
    --good:#3a6b4a;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Menlo","Consolas","Liberation Mono",monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:#0a0e17;
    font-family:var(--sans);
    color:var(--ink);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* ----- scaling stage ----- */
  #stage{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #canvas{
    position:relative;
    width:1280px;
    height:720px;
    transform-origin:center center;
    background:var(--paper);
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
  }
  .slide{
    position:absolute;
    inset:0;
    height:720px;          /* definite height so flex-column children (flex:1 1 0) actually shrink */
    max-height:720px;
    padding:56px 72px 64px;
    display:none;
    flex-direction:column;
    overflow:hidden;
  }
  .slide.active{display:flex;}

  /* ----- shared type ----- */
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--slate);
    font-weight:600;
  }
  h1,h2,h3{margin:0;text-wrap:balance;}
  .rule{height:1px;background:var(--hair);border:0;margin:0;}

  /* ===== TITLE SLIDE ===== */
  .slide--title{
    background:
      radial-gradient(120% 90% at 85% 10%, #1f2b44 0%, transparent 55%),
      linear-gradient(155deg,var(--ink) 0%,#0c1322 100%);
    color:var(--paper);
    padding:72px 80px;
    justify-content:space-between;
  }
  .slide--title .topline{
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .slide--title .mark{
    font-family:var(--mono);font-size:13px;letter-spacing:.34em;
    text-transform:uppercase;color:var(--accent-soft);font-weight:600;
  }
  .slide--title .date{
    font-family:var(--mono);font-size:13px;letter-spacing:.12em;color:var(--slate-2);
  }
  .slide--title h1{
    font-size:74px;line-height:1.02;font-weight:800;letter-spacing:-.025em;
    max-width:18ch;
  }
  .slide--title h1 .accent{color:#9db4d8;}
  .slide--title .sub{
    font-size:21px;color:#c4ccda;margin-top:22px;font-weight:400;letter-spacing:.01em;
  }
  .title-foot{display:flex;justify-content:space-between;align-items:flex-end;gap:40px;}
  .title-note{
    font-size:13.5px;line-height:1.55;color:var(--slate-2);max-width:62ch;
    border-left:2px solid var(--accent);padding-left:16px;
  }
  .title-stat{text-align:right;}
  .title-stat .big{font-size:54px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;}
  .title-stat .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate-2);margin-top:6px;}

  /* ===== CONTENTS ===== */
  .slide--toc h2{font-size:34px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;}
  .toc-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:18px 32px;margin-top:26px;flex:1;
  }
  .toc-card{
    border:1px solid var(--hair);border-top:3px solid var(--accent);
    padding:18px 22px;display:flex;flex-direction:column;gap:8px;background:#fff;
  }
  .toc-card .dnum{font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--accent);font-weight:700;}
  .toc-card .dname{font-size:18.5px;font-weight:700;letter-spacing:-.01em;line-height:1.15;}
  .toc-card .pitches{font-size:13px;color:var(--slate);line-height:1.5;}
  .toc-card .pitches b{color:var(--ink);font-weight:600;}

  /* ===== DOMAIN DIVIDER ===== */
  .slide--divider{
    background:linear-gradient(150deg,var(--ink) 0%,#141d30 100%);
    color:var(--paper);justify-content:center;padding:72px 80px;
  }
  .slide--divider .dlabel{font-family:var(--mono);font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#9db4d8;}
  .slide--divider h2{font-size:60px;font-weight:800;letter-spacing:-.03em;line-height:1.03;margin-top:18px;max-width:20ch;}
  .divider-meta{display:flex;gap:56px;margin-top:46px;}
  .divider-meta .blk .k{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate-2);margin-bottom:10px;}
  .divider-meta .sub-list{display:flex;flex-direction:column;gap:7px;}
  .divider-meta .sub-list span{font-size:15.5px;color:#d3dae6;}
  .divider-meta .sub-list span b{color:#fff;}
  .divider-meta .countbig{font-size:48px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
  .divider-meta .countlbl{font-size:13px;color:var(--slate-2);margin-top:6px;}

  /* ===== PITCH SLIDE ===== */
  /* dense pitch slides: tighter padding + reserved footer so body never overlaps.
     per-domain accent set via inline --dom-accent / --dom-soft / --dom-deep on .slide--pitch */
  .slide--pitch{
    padding:22px 54px 16px;
    --da:var(--accent);        /* domain accent (overridden inline) */
    --da-soft:var(--accent-soft);
    --da-deep:var(--accent-deep);
  }
  .pitch-head{
    display:flex;justify-content:space-between;align-items:flex-start;gap:22px;
    padding-bottom:8px;border-bottom:2px solid var(--da);
  }
  .pitch-head .left{flex:1;min-width:0;}
  .pitch-head .right-head{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:7px;padding-top:1px;}
  .tags{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
  .tag{
    font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;
    font-weight:700;padding:3px 9px;border-radius:2px;
  }
  .tag.dom{background:var(--da);color:#fff;}
  .tag.sub{background:var(--da-soft);color:var(--da-deep);}
  .pitch-name{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.02;}
  .pitch-name .pt{color:var(--da-deep);}
  .pitch-one{font-size:13px;color:var(--slate);line-height:1.34;margin-top:4px;max-width:80ch;font-weight:400;}
  .pitch-one em{font-style:normal;color:var(--ink);font-weight:600;}

  /* pitch-of-N marker + recommendation chip + contrarian badge (right of header) */
  .pofn{font-family:var(--mono);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--slate-2);font-weight:600;white-space:nowrap;}
  .rec-chip{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
    font-weight:700;padding:5px 12px;border-radius:2px;white-space:nowrap;
    display:inline-flex;align-items:center;gap:6px;
  }
  .rec-chip::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;}
  .rec-chip.advance{background:#e7f1ea;color:#2f5d3f;border:1px solid #bcd8c6;}
  .rec-chip.watch{background:#f6efe0;color:#8a6a1f;border:1px solid #e3d3a8;}
  .rec-chip.pass{background:#f3e6df;color:#9a4a2f;border:1px solid #e0c5b6;}
  .badge-contra{
    font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;
    font-weight:700;color:#fff;background:var(--contra);padding:4px 10px;border-radius:2px;
    white-space:nowrap;display:inline-flex;align-items:center;gap:6px;
  }
  .badge-contra::before{content:"◆";font-size:8px;}

  /* body = two columns; grows, may shrink (min-height:0), clips rather than spilling */
  .pitch-body{
    display:grid;grid-template-columns:1.04fr 0.96fr;grid-template-rows:minmax(0,1fr);
    gap:0 28px;margin-top:9px;
    flex:1 1 0;min-height:0;overflow:hidden;
  }
  .col{display:flex;flex-direction:column;gap:6px;min-height:0;overflow:hidden;}
  .col.right{border-left:1px solid var(--hair);padding-left:26px;}

  /* column section label */
  .col-label{
    font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;
    font-weight:700;color:var(--slate-2);margin-bottom:1px;
  }

  .field .k{
    font-family:var(--mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;
    color:var(--da);font-weight:700;margin-bottom:1px;display:flex;align-items:center;gap:5px;
  }
  .field .k .ic{font-size:10px;opacity:.85;}
  .field .v{font-size:11px;line-height:1.34;color:var(--ink-2);}
  .field .v b{font-weight:700;color:var(--ink);}
  sup.cite{font-family:var(--mono);font-size:9px;color:var(--da);font-weight:700;vertical-align:super;line-height:0;padding-left:1px;}

  /* scale box now lives in the LEFT column */
  .scale-box{
    background:var(--paper-2);border:1px solid var(--hair);border-left:3px solid var(--da);
    padding:6px 11px;margin-top:auto;flex:none;
  }
  .scale-box .k{
    font-family:var(--mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;
    color:var(--da-deep);font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px;
  }
  .scale-box .badge500{
    font-family:var(--mono);font-size:8.5px;letter-spacing:.05em;font-weight:800;
    background:var(--da);color:#fff;padding:1px 6px;border-radius:2px;text-transform:none;
  }
  .scale-box .v{font-size:11px;line-height:1.36;color:var(--ink-2);}
  .scale-box .v b{font-weight:700;color:var(--ink);}

  /* RIGHT column = the case: Why Now (for) / Why Not (against) */
  .case-box{border:1px solid var(--hair);border-radius:3px;padding:7px 11px 8px;}
  .case-box + .case-box{margin-top:7px;}
  .case-box.for{background:#f1f6f2;border-color:#cfe2d4;border-left:3px solid #3a6b4a;}
  .case-box.against{background:#f9f1e8;border-color:#ecdcc4;border-left:3px solid #b9772f;}
  .case-head{
    font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:6px;
  }
  .case-box.for .case-head{color:#2f5d3f;}
  .case-box.against .case-head{color:#955a1f;}
  .case-head .sym{font-size:11px;font-weight:800;}
  .case-list{display:flex;flex-direction:column;gap:3.5px;}
  .case-list .crow{display:flex;gap:7px;font-size:10px;line-height:1.32;color:var(--ink-2);}
  .case-list .crow .cm{font-size:9px;flex:none;padding-top:2px;font-weight:800;}
  .case-box.for .crow .cm{color:#3a6b4a;}
  .case-box.against .crow .cm{color:#b9772f;}
  .case-list .crow b{font-weight:700;color:var(--ink);}
  .case-list .crow.novelty{font-family:var(--mono);font-size:9px;line-height:1.34;}
  .case-box.for .crow.novelty{color:#2f5d3f;}
  .case-box.against .crow.novelty{color:#955a1f;}

  /* footer = sources only, reserved in normal flow (flex:none) so body can't overlap */
  .pitch-foot{flex:none;margin-top:7px;}
  .sources{
    padding-top:6px;border-top:1px dotted var(--hair-2);
    font-family:var(--mono);font-size:8.5px;line-height:1.5;color:var(--slate);
  }
  .sources b{color:var(--da-deep);font-weight:700;}
  .sources a{color:var(--da);text-decoration:underline;text-underline-offset:1.5px;}
  .sources i{font-style:italic;}

  /* ===== SHORTLIST ===== */
  .slide--shortlist h2{font-size:34px;font-weight:800;letter-spacing:-.02em;}
  .slide--shortlist .lede{font-size:14.5px;color:var(--slate);margin-top:6px;max-width:90ch;line-height:1.45;}
  .sl-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px;margin-top:22px;flex:1;}
  .sl-card{border:1px solid var(--hair);border-top:3px solid var(--good);padding:14px 18px;background:#fff;display:flex;flex-direction:column;gap:9px;}
  .sl-card .dom{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);font-weight:700;}
  .sl-pick{display:flex;gap:9px;font-size:13px;line-height:1.4;color:var(--ink-2);}
  .sl-pick .nm{font-weight:800;color:var(--ink);white-space:nowrap;}
  .sl-pick .nm .c{color:var(--contra);font-size:9px;vertical-align:super;font-family:var(--mono);}
  .sl-foot{margin-top:14px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--slate);text-align:center;border-top:1px solid var(--hair);padding-top:12px;}

  /* ===== CHROME ===== */
  #chrome{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    display:flex;align-items:center;gap:14px;
    padding:10px 18px;color:#aeb4c0;font-family:var(--mono);font-size:12px;
    pointer-events:none;
  }
  #chrome .nav{pointer-events:auto;display:flex;gap:8px;}
  #chrome button{
    font-family:var(--mono);font-size:13px;background:rgba(255,255,255,.08);color:#dfe3ea;
    border:1px solid rgba(255,255,255,.14);border-radius:4px;width:30px;height:28px;cursor:pointer;
    transition:background .15s;
  }
  #chrome button:hover{background:rgba(255,255,255,.18);}
  #chrome button:focus-visible{outline:2px solid #9db4d8;outline-offset:2px;}
  #counter{letter-spacing:.1em;font-variant-numeric:tabular-nums;}
  #ctitle{color:#7d8492;letter-spacing:.04em;}
  #progress{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:30;transition:width .25s ease;}
  @media (prefers-reduced-motion:reduce){
    #progress{transition:none;}
  }
</style>
</head>
<body>




<div id="progress"></div>
<div id="stage"><div id="canvas"></div></div>
<div id="chrome">
  <div class="nav">
    <button id="prev" aria-label="Previous slide">&larr;</button>
    <button id="next" aria-label="Next slide">&rarr;</button>
  </div>
  <span id="counter">01 / 22</span>
  <span id="ctitle"></span>
</div>

<script>
/* ============ DATA ============ */
const DOMAINS = [
  {
    n:"01", name:"Energy Operations in Manufacturing",
    subs:["Process & Asset Intelligence","Grid-Interactive & Flexibility","Carbon-Linked Energy Compliance"],
    backdrop:"AG's steel plants are among Guatemala's largest energy consumers — a live proving ground, real load data, a credible reference customer."
  },
  {
    n:"02", name:"Industrial Freight & Port Congestion",
    subs:["Inland Fleet Reliability & Cargo Security","Freight Working Capital & Payments","Routing, Capacity & Visibility Intelligence"],
    backdrop:"AG is a large regional importer with a network of transport providers — built-in scale, carriers, lanes, and freight spend to seed any venture. (Stays clear of PortClear's ocean/port lane.)"
  },
  {
    n:"03", name:"Industrial Distribution Channel Gaps",
    subs:["Embedded Commerce & Credit at PoS","Last-Mile & Fulfillment","Channel / Dealer Enablement"],
    backdrop:"Existing B2B customer relationships + a retail channel (Distun) give AG a head start over outside entrants. (Scoped away from Veta's demand intelligence.)"
  },
  {
    n:"04", name:"Long-Term Demand Forecasting for Industrials",
    subs:["Strategic Capacity & Capex Planning","Procurement, S&OP & Price Foresight","Macro-Industrial Intelligence"],
    backdrop:"AG's cross-sector transaction/demand data and multi-market vantage (steel, materials, distribution, imports) is the asset an outside startup can't assemble. (Longer-horizon than Veta.)"
  }
];

const PITCHES = [
  /* ---- DOMAIN 1: ENERGY ---- */
  {
    dom:"Energy Ops", sub:"Process & Asset Intelligence", contra:false,
    name:"KiloWise", one:"An <em>agentic energy-cost copilot</em> that reads existing meters/PLC/SCADA and tells the shift supervisor, in plain Spanish, the cheapest way to run the next 8 hours — no new hardware.",
    customer:"Plant/energy managers & shift supervisors at mid-sized LatAm manufacturers ($20M–$300M rev): food, plastics, textiles, mid-tier metals — too small for a Siemens deployment, too big to fly blind.",
    problem:"Energy is a top-3, rising cost line, but the team only sees it monthly on the bill — after the peak-demand charge is locked. JTBD: run today's production for the least money without stopping the line.",
    product:"Software-only ingestion of existing meter/SCADA data → forecasts daily load + tariff exposure → pushes ranked actions (\"kill idle compressor bank B,\" \"shift the 2pm melt to 9pm\") via WhatsApp/mobile; tracks realized savings.",
    ag:"<b>Domain expertise + load data + reference customer.</b> AG's Guatemalan steel plants give a live high-variance load to train the action engine, plus operators who validate which recommendations are operationally safe. Trained models + playbook travel with the venture; AG access is a head-start, not the moat.",
    why:[
      "<b>Analog with traction:</b> Germany's Ecoplanet raised a €16M Series A (Jan 2025, EQT Ventures); France's METRON has raised ~$55M total across rounds for AI industrial energy management — funded in Europe, largely absent for LatAm mid-market.",
      "<b>Problem size:</b> energy-management programs deliver double-digit % savings in industry (IEA-documented first-year results of ~5–30% across plants) — on a top-3 cost line under sustained tariff pressure in Guatemala.",
      "<b>Catalyst:</b> Cheap LLM agents make a Spanish, mobile-first copilot for non-technical supervisors viable now."
    ],
    scale:"Land in Guatemalan mid-market → replicate market-by-market (Central America, Mexico, Brazil, Andean) → expand from copilot to full energy system-of-record. Tens of thousands of plants × a few $K/mo clears <b>$500M</b>.",
    sources:`<a href="https://www.eu-startups.com/2025/01/germanys-ecoplanet-raises-e16-million-to-help-companies-cut-energy-costs-and-emissions/">EU-Startups. (2025). <i>Ecoplanet raises €16M Series A</i>.</a> · <a href="https://www.iea.org/commentaries/industrial-facilities-could-save-billions-by-implementing-energy-management">IEA. (2024). <i>Industrial facilities could save billions by implementing energy management</i>.</a> · <a href="https://www.mate-solar.com/guatemala-energy-storage-market-2026-the-definitive-technical-commercial-guide-for-industrial-and-commercial-stakeholders/">Mate Solar. (2026). <i>Guatemala energy storage market 2026</i>.</a> [T3]`,
    novelty:"Novelty signal: NEGATIVE — closest analogs (Ecoplanet Series A, METRON multi-round/~$55M) are funded incumbents in the same AI industrial-energy lane, not fresh seed; market is contested, not whitespace.",
    rec:"watch",
    whyNot:[
      "<b>Novelty: not fresh.</b> Ecoplanet (Series A, EQT) and METRON (~$55M) already occupy the AI industrial-energy lane — the model is contested, the LatAm geography the only open angle.",
      "<b>Crowded value prop:</b> \"another dashboard / copilot\" is exactly what mid-market plants have been pitched for a decade and tuned out — adoption, not technical feasibility, is the risk.",
      "<b>WTP risk:</b> SaaS-seat pricing on a savings promise the buyer hasn't seen yet; the cheaper-to-believe outcome model (see PhantomLoad) may out-compete it."
    ]
  },
  {
    dom:"Energy Ops", sub:"Process & Asset Intelligence", contra:true,
    name:"PhantomLoad", one:"Instead of a dashboard, it sells <em>found money</em>: AI disaggregates existing meter data to expose hidden waste and bills only as a <em>share of the savings it proves</em>.",
    customer:"CFOs / plant GMs at energy-intensive LatAm manufacturers — the budget owner who feels the cost line, not the engineer who reads the dashboard.",
    problem:"Manufacturers have been pitched dashboards for a decade and stopped buying — \"another screen no one looks at.\" Real JTBD: cut my bill without staffing an analyst, installing hardware, or trusting a vague promise.",
    product:"Read-only ingestion of interval-meter/SCADA → ML disaggregation (motor current signature, power-quality anomaly — no new sensors) itemizes waste w/ a $ figure + fix → M&V proves the saving → <b>outcome billing: % of verified savings, $0 upfront.</b>",
    ag:"<b>Operational asset + early revenue + M&V credibility.</b> AG steel plants are the ideal first proving ground — huge, messy, sensor-rich load to train disaggregation models and prove savings-share economics on a hostile real load. AG becomes a paying anchor whose verified savings number is the sales proof.",
    why:[
      "<b>Contrarian premise, data-backed:</b> equipment-level analytics now detect critical motor issues without installing additional sensors (Eaton, Apr 2026 software release) — so \"$0 hardware, pay-from-savings\" is technically real now.",
      "<b>Why it wins here:</b> mid-market buyers won't pre-pay for unproven software; outcome pricing removes the barrier that kills EMS SaaS — and motor-system optimization routinely captures 11–18% of motor energy (US DOE).",
      "<b>Problem size:</b> sustained Guatemalan industrial-tariff pressure makes a savings-share offer self-funding and an easy yes."
    ],
    scale:"Savings-share land-and-expand across LatAm energy-intensive verticals → the verified-savings dataset becomes a defensible targeting asset → expand into power-factor, predictive motor failure, demand-charge lines. Price tracks the (large) waste pool — clears <b>$500M</b>.",
    sources:`<a href="https://finance.yahoo.com/sectors/technology/articles/eaton-predictive-maintenance-software-significantly-130000943.html">Eaton (via ACCESS Newswire/Yahoo Finance). (2026). <i>Predictive-maintenance software detects issues without added sensors</i>.</a> [T3, vendor] · <a href="https://www.osti.gov/servlets/purl/1210896">U.S. DOE / Office of Scientific & Technical Information. (n.d.). <i>Improving motor and drive system performance</i>.</a> [T1] · <a href="https://www.mate-solar.com/guatemala-energy-storage-market-2026-the-definitive-technical-commercial-guide-for-industrial-and-commercial-stakeholders/">Mate Solar. (2026). <i>Guatemala energy storage market 2026</i>.</a> [T3]`,
    novelty:"Novelty signal: NEGATIVE — no exact-lane seed twin, but the pay-from-savings M&V space is mature-to-scarred (Redaptive ~$1B+ raised; Carbon Lighthouse wound down; Sealed pivoted). Differentiate hard on sensor-free, software-only disaggregation.",
    rec:"advance",

      "<b>Documented gap:</b> LatAm DFIs are explicitly tasked to scale industrial/MSME financing but lack data; informality (30–70% across major economies) starves lenders of the credit-relevant signal.",
      "<b>Toolkit proven:</b> ChAI built AI raw-material/price foresight from satellite + alt data and expanded into insurance — proof the toolkit works, applied here to AG's proprietary physical-economy data."
    ],
    scale:"Wedge = LatAm industrial-activity indices for a handful of DFIs/banks → expand by products (nowcast feed → credit scoring → project-risk/insurance pricing → trade-finance underwriting), customer type (lenders → insurers → governments/multilaterals), and geography (LatAm → all EM). A physical-economy intelligence layer for EM capital allocation clears <b>$500M</b>.",
    sources:`<a href="https://www.quant-cube.com/macro-nowcast">QuantCube Technology. (n.d.). <i>Macro nowcast</i> (real-time macro estimates, DM + EM coverage).</a> [T3, vendor] · <a href="https://www.grandviewresearch.com/industry-analysis/alternative-data-market">Grand View Research. (2025). <i>Alternative data market</i> (~$18.8B 2025; ~37% CAGR).</a> [T3] · <a href="https://www.elibrary.imf.org/display/book/9781513575919/ch006.xml">IMF. (2021). <i>The global informal workforce</i> (LatAm informality 30–70%).</a> [T1] · <a href="https://www.oecd.org/en/publications/latin-american-economic-outlook-2025_80e48de5-en/full-report/financing-production-transformation_0f843ccc.html">OECD. (2025). <i>Latin American Economic Outlook 2025: financing production transformation</i>.</a> [T1]`,
    novelty:"Novelty signal: NEGATIVE — the incumbent analogs are mature: RavenPack (Series B+, GP Bullhound/EIB/FT-backed) and QuantCube (Series B, Moody's-anchored) own the institutional nowcast lane, and ChAI's funding is stale (seed 2020, last raise 2022). The differentiated angle is the DFI/MSME/informal-economy application, not the nowcasting toolkit.",
    rec:"advance",
    whyNot:[
      "<b>Novelty: mature incumbents.</b> RavenPack (Series B+) and QuantCube (Series B, Moody's-anchored) own the institutional nowcast lane — the toolkit is contested; only the DFI/MSME/informal-economy application is differentiated.",
      "<b>Data-licensability is the linchpin:</b> the whole moat is AG's physical-economy transaction footprint sold as a feed — flagged [needs verification] for whether it can be aggregated/anonymized enough to license externally.",
      "<b>Slow institutional sales:</b> banks, DFIs, and insurers are long-cycle, procurement-heavy buyers; proving the nowcast actually improves underwriting decisions is a high evidentiary bar.",
      "<b>Single-source signal risk:</b> a feed anchored on AG's flows may not generalize across regions/sectors without broader data partnerships."
    ]
  }
];

const SHORTLIST = [
  {dom:"Energy Operations", picks:[
    {nm:"PhantomLoad", c:true, why:"contrarian swing — outcome-based pricing removes the EMS adoption barrier; AG load is the proving ground."},
    {nm:"FlexWatt", c:false, why:"cost-avoidance works day one, then graduates to per-MW VPP revenue as LatAm DR markets open."}
  ]},
  {dom:"Freight & Port", picks:[
    {nm:"Flete al Día", c:false, why:"strongest analog (Triumph), cleanest AG advantage (payables = anchor receivable book); cheapest test."},
    {nm:"NegroLogística", c:true, why:"highest ceiling, most defensible — a data network competitors structurally can't build."}
  ]},
  {dom:"Distribution", picks:[
    {nm:"Crédito Distun", c:false, why:"durable underwriting moat (AG purchase data), hottest funded analog (Slope), clearest compounding path."},
    {nm:"RepOS", c:true, why:"contrarian counter-bet — cheap to test on AG's own reps and de-risks Crédito's distribution."}
  ]},
  {dom:"Demand Forecasting", picks:[
    {nm:"Bedrock", c:true, why:"biggest, cleanest transferable data moat, furthest from Veta, real funded analogs."},
    {nm:"Counterweight", c:true, why:"genuinely non-consensus (forecast supply, not demand), strong AG import vantage."}
  ]}
];

/* ============ RENDER ============ */
const cv = document.getElementById('canvas');
const slides = [];
function add(html, title){ slides.push({html, title}); }

/* superscript numbering for citations inline isn't separated per-source in the files,
   so we render a compact source line per slide (preserves all cited names/links). */

/* 1. TITLE */
add(`<div class="slide slide--title">
  <div class="topline">
    <span class="mark">InnovArise · Venture Studio</span>
    <span class="date">2026-06-28</span>
  </div>
  <div>
    <h1>Explore: <span class="accent">Venture<br>Pitch Deck</span></h1>
    <div class="sub">4 domains · 16 pitches for Board / IC review</div>
  </div>
  <div class="title-foot">
    <div class="title-note">Pre-decisional hypotheses. Rationale researched &amp; cited; the AG-advantage path on every pitch is hypothesized and must be BU-confirmed in Discover. Pick what advances.</div>
    <div class="title-stat"><div class="big">16</div><div class="lbl">pitches · 4 domains</div></div>
  </div>
</div>`, "Title");

/* 2. CONTENTS */
const tocCards = DOMAINS.map((d,i)=>{
  const ps = PITCHES.filter(p => p.dom === ["Energy Ops","Freight & Port","Distribution","Demand Forecasting"][i]);
  const names = ps.map(p=>`<b>${p.name}</b>${p.contra?' ◆':''}`).join(" · ");
  return `<div class="toc-card">
    <span class="dnum">DOMAIN ${d.n}</span>
    <span class="dname">${d.name}</span>
    <span class="pitches">${names}</span>
  </div>`;
}).join("");
add(`<div class="slide slide--toc">
  <span class="eyebrow">Contents</span>
  <h2>Four domains, sixteen pitches</h2>
  <div class="toc-grid">${tocCards}</div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--slate);margin-top:14px;">◆ = contrarian pitch · one idea per slide, scannable in ~20s</div>
</div>`, "Contents");

const DOMKEY = ["Energy Ops","Freight & Port","Distribution","Demand Forecasting"];
/* per-domain accent palette: [accent, soft (chip bg), deep (text)] */
const DOMACCENT = {
  "Energy Ops":        {a:"#3f5e8c", soft:"#e7ecf4", deep:"#2c466e"}, /* slate blue */
  "Freight & Port":    {a:"#1f7a73", soft:"#e1f0ee", deep:"#155b56"}, /* teal */
  "Distribution":      {a:"#8a5a3c", soft:"#f1e7df", deep:"#6b4327"}, /* terracotta */
  "Demand Forecasting":{a:"#5a4a86", soft:"#ebe7f3", deep:"#42356a"}  /* indigo violet */
};
const REC = {
  advance:{cls:"advance", label:"Advance to Discover"},
  watch:  {cls:"watch",   label:"Watch"},
  pass:   {cls:"pass",    label:"Pass"}
};
DOMAINS.forEach((d, di) => {
  const ps = PITCHES.filter(p => p.dom === DOMKEY[di]);
  /* DIVIDER */
  add(`<div class="slide slide--divider">
    <span class="dlabel">Domain ${d.n} of 04</span>
    <h2>${d.name}</h2>
    <div class="divider-meta">
      <div class="blk">
        <div class="k">Subdomains</div>
        <div class="sub-list">${d.subs.map(s=>`<span>· ${s}</span>`).join("")}</div>
      </div>
      <div class="blk">
        <div class="k">Pitches</div>
        <div class="countbig">${ps.length}</div>
        <div class="countlbl">${ps.filter(p=>p.contra).length} contrarian</div>
      </div>
      <div class="blk" style="max-width:34ch;">
        <div class="k">AG advantage backdrop</div>
        <div class="sub-list"><span>${d.backdrop}</span></div>
      </div>
    </div>
  </div>`, d.name);

  /* PITCH SLIDES */
  const acc = DOMACCENT[DOMKEY[di]];
  const accStyle = `--da:${acc.a};--da-soft:${acc.soft};--da-deep:${acc.deep};`;
  ps.forEach((p, pi) => {
    const rec = REC[p.rec] || REC.watch;
    /* Why Now = the FOR case (the rationale points); fold POSITIVE novelty in as a point. */
    const whyNowRows = p.why.map(w=>`<div class="crow"><span class="cm">▲</span><span>${w}</span></div>`).join("");
    const noveltyPos = /POSITIVE/.test(p.novelty);
    const noveltyText = p.novelty.replace(/^Novelty signal:\s*/,'');
    /* fold novelty into Why Now when POSITIVE (fresh); when NEGATIVE it's already led
       as the first Why Not bullet, so we don't duplicate it. */
    const novNowRow = noveltyPos ? `<div class="crow novelty"><span class="cm">◆</span><span><b>Novelty:</b> ${noveltyText}</span></div>` : "";
    /* Why Not = the AGAINST case (NEGATIVE novelty is folded into its first bullet). */
    const whyNotRows = p.whyNot.map(w=>`<div class="crow"><span class="cm">▼</span><span>${w}</span></div>`).join("");

    add(`<div class="slide slide--pitch" style="${accStyle}">
      <div class="pitch-head">
        <div class="left">
          <div class="tags">
            <span class="tag dom">${p.dom}</span>
            <span class="tag sub">${p.sub}</span>
          </div>
          <div class="pitch-name"><span class="pt">${p.name}</span></div>
          <div class="pitch-one">${p.one}</div>
        </div>
        <div class="right-head">
          <span class="pofn">Pitch ${pi+1} of ${ps.length} · ${p.dom}</span>
          <span class="rec-chip ${rec.cls}">${rec.label}</span>
          ${p.contra ? '<span class="badge-contra">Contrarian</span>' : ''}
        </div>
      </div>
      <div class="pitch-body">
        <div class="col left">
          <div class="col-label">The pitch</div>
          <div class="field"><div class="k"><span class="ic">◷</span>Customer</div><div class="v">${p.customer}</div></div>
          <div class="field"><div class="k"><span class="ic">✦</span>Problem · JTBD</div><div class="v">${p.problem}</div></div>
          <div class="field"><div class="k"><span class="ic">▸</span>Product hypothesis</div><div class="v">${p.product}</div></div>
          <div class="field"><div class="k"><span class="ic">◇</span>AG advantage hypothesis</div><div class="v">${p.ag}</div></div>
          <div class="scale-box">
            <div class="k">Scale hypothesis <span class="badge500">≥$500M</span></div>
            <div class="v">${p.scale}</div>
          </div>
        </div>
        <div class="col right">
          <div class="col-label">The case</div>
          <div class="case-box for">
            <div class="case-head"><span class="sym">▲</span>Why Now</div>
            <div class="case-list">${whyNowRows}${novNowRow}</div>
          </div>
          <div class="case-box against">
            <div class="case-head"><span class="sym">▼</span>Why Not</div>
            <div class="case-list">${whyNotRows}</div>
          </div>
        </div>
      </div>
      <div class="pitch-foot">
        <div class="sources"><b>Sources:</b> ${p.sources}</div>
      </div>
    </div>`, p.name);
  });
});

/* SHORTLIST */
const slCards = SHORTLIST.map(s=>`
  <div class="sl-card">
    <div class="dom">${s.dom}</div>
    ${s.picks.map(p=>`<div class="sl-pick"><span class="nm">${p.nm}${p.c?'<span class="c">◆</span>':''}</span><span>${p.why}</span></div>`).join("")}
  </div>`).join("");
add(`<div class="slide slide--shortlist">
  <span class="eyebrow">Recommendation</span>
  <h2>Recommended shortlist to advance to Discover</h2>
  <div class="lede">Two picks per domain — the highest-conviction and the asymmetric/contrarian swing. ◆ = contrarian. These are the studio's recommendations; the Board decides what enters Discover.</div>
  <div class="sl-grid">${slCards}</div>
  <div class="sl-foot">Pre-decisional · every AG-advantage path is hypothesized &amp; must be BU-confirmed in Discover · THE BOARD DECIDES</div>
</div>`, "Shortlist");

/* inject */
cv.innerHTML = slides.map((s,i)=>s.html.replace('class="slide','class="slide'+(i===0?' active':''))).join("");
const els = Array.from(cv.querySelectorAll('.slide'));
let idx = 0;
const counter = document.getElementById('counter');
const ctitle = document.getElementById('ctitle');
const prog = document.getElementById('progress');

function pad(n){return String(n).padStart(2,'0');}
function show(i){
  idx = Math.max(0, Math.min(els.length-1, i));
  els.forEach((e,k)=>e.classList.toggle('active', k===idx));
  counter.textContent = pad(idx+1)+' / '+pad(els.length);
  ctitle.textContent = slides[idx].title;
  prog.style.width = ((idx)/(els.length-1)*100)+'%';
}
function next(){show(idx+1);}
function prev(){show(idx-1);}

document.getElementById('next').addEventListener('click', next);
document.getElementById('prev').addEventListener('click', prev);
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
  else if(e.key==='Home'){e.preventDefault();show(0);}
  else if(e.key==='End'){e.preventDefault();show(els.length-1);}
});

/* auto-scale 1280x720 to viewport */
function scale(){
  const m = 24;
  const s = Math.min((window.innerWidth-m*2)/1280, (window.innerHeight-m*2)/720);
  cv.style.transform = 'scale('+s+')';
}
window.addEventListener('resize', scale);
scale();
show(0);
</script>

</body>
</html>
