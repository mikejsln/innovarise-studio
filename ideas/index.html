<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="4 domains · 16 venture pitches for Board/IC review — pre-decisional, cited hypotheses.">
<title>InnovArise — Explore: Venture Pitch Deck</title>
<style>
  :root{
    --ink:#10182a;
    --ink-2:#1b2436;
    --paper:#f7f6f3;
    --paper-2:#efece4;
    --slate:#5a6172;
    --slate-2:#878d9b;
    --hair:#dcdad3;
    --hair-2:#c9c6bd;
    --accent:#3f5e8c;
    --accent-deep:#2c466e;
    --accent-soft:#e7ecf4;
    --contra:#9a4a2f;
    --contra-soft:#f3e6df;
    --good:#3a6b4a;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Menlo","Consolas","Liberation Mono",monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:#0a0e17;
    font-family:var(--sans);
    color:var(--ink);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* ----- scaling stage ----- */
  #stage{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #canvas{
    position:relative;
    width:1280px;
    height:720px;
    transform-origin:center center;
    background:var(--paper);
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
  }
  .slide{
    position:absolute;
    inset:0;
    padding:56px 72px 64px;
    display:none;
    flex-direction:column;
    overflow:hidden;
  }
  .slide.active{display:flex;}

  /* ----- shared type ----- */
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--slate);
    font-weight:600;
  }
  h1,h2,h3{margin:0;text-wrap:balance;}
  .rule{height:1px;background:var(--hair);border:0;margin:0;}

  /* ===== TITLE SLIDE ===== */
  .slide--title{
    background:
      radial-gradient(120% 90% at 85% 10%, #1f2b44 0%, transparent 55%),
      linear-gradient(155deg,var(--ink) 0%,#0c1322 100%);
    color:var(--paper);
    padding:72px 80px;
    justify-content:space-between;
  }
  .slide--title .topline{
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .slide--title .mark{
    font-family:var(--mono);font-size:13px;letter-spacing:.34em;
    text-transform:uppercase;color:var(--accent-soft);font-weight:600;
  }
  .slide--title .date{
    font-family:var(--mono);font-size:13px;letter-spacing:.12em;color:var(--slate-2);
  }
  .slide--title h1{
    font-size:74px;line-height:1.02;font-weight:800;letter-spacing:-.025em;
    max-width:18ch;
  }
  .slide--title h1 .accent{color:#9db4d8;}
  .slide--title .sub{
    font-size:21px;color:#c4ccda;margin-top:22px;font-weight:400;letter-spacing:.01em;
  }
  .title-foot{display:flex;justify-content:space-between;align-items:flex-end;gap:40px;}
  .title-note{
    font-size:13.5px;line-height:1.55;color:var(--slate-2);max-width:62ch;
    border-left:2px solid var(--accent);padding-left:16px;
  }
  .title-stat{text-align:right;}
  .title-stat .big{font-size:54px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;}
  .title-stat .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate-2);margin-top:6px;}

  /* ===== CONTENTS ===== */
  .slide--toc h2{font-size:34px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;}
  .toc-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:18px 32px;margin-top:26px;flex:1;
  }
  .toc-card{
    border:1px solid var(--hair);border-top:3px solid var(--accent);
    padding:18px 22px;display:flex;flex-direction:column;gap:8px;background:#fff;
  }
  .toc-card .dnum{font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--accent);font-weight:700;}
  .toc-card .dname{font-size:18.5px;font-weight:700;letter-spacing:-.01em;line-height:1.15;}
  .toc-card .pitches{font-size:13px;color:var(--slate);line-height:1.5;}
  .toc-card .pitches b{color:var(--ink);font-weight:600;}

  /* ===== DOMAIN DIVIDER ===== */
  .slide--divider{
    background:linear-gradient(150deg,var(--ink) 0%,#141d30 100%);
    color:var(--paper);justify-content:center;padding:72px 80px;
  }
  .slide--divider .dlabel{font-family:var(--mono);font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#9db4d8;}
  .slide--divider h2{font-size:60px;font-weight:800;letter-spacing:-.03em;line-height:1.03;margin-top:18px;max-width:20ch;}
  .divider-meta{display:flex;gap:56px;margin-top:46px;}
  .divider-meta .blk .k{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate-2);margin-bottom:10px;}
  .divider-meta .sub-list{display:flex;flex-direction:column;gap:7px;}
  .divider-meta .sub-list span{font-size:15.5px;color:#d3dae6;}
  .divider-meta .sub-list span b{color:#fff;}
  .divider-meta .countbig{font-size:48px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
  .divider-meta .countlbl{font-size:13px;color:var(--slate-2);margin-top:6px;}

  /* ===== PITCH SLIDE ===== */
  /* dense pitch slides: tighter padding + flow column that never overlaps */
  .slide--pitch{padding:40px 64px 30px;}
  .pitch-head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;}
  .pitch-head .left{flex:1;min-width:0;}
  .tags{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
  .tag{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
    font-weight:600;padding:3px 9px;border-radius:2px;
  }
  .tag.dom{background:var(--ink);color:var(--paper);}
  .tag.sub{background:var(--accent-soft);color:var(--accent-deep);}
  .tag.lens{background:var(--paper-2);color:var(--slate);border:1px solid var(--hair-2);}
  .badge-contra{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    font-weight:700;color:#fff;background:var(--contra);padding:5px 12px;border-radius:2px;
    white-space:nowrap;display:inline-flex;align-items:center;gap:6px;
  }
  .badge-contra::before{content:"◆";font-size:9px;}
  .pitch-name{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.04;}
  .pitch-name .pt{color:var(--accent-deep);}
  .pitch-one{font-size:14.5px;color:var(--slate);line-height:1.38;margin-top:6px;max-width:78ch;font-weight:400;}
  .pitch-one em{font-style:normal;color:var(--ink);font-weight:600;}

  /* body = two columns; grows but is allowed to shrink (min-height:0) and clips
     rather than spilling onto the footer block below it */
  .pitch-body{
    display:grid;grid-template-columns:1fr 1fr;gap:0 34px;margin-top:14px;
    flex:1 1 auto;min-height:0;overflow:hidden;
  }
  .col{display:flex;flex-direction:column;gap:10px;min-height:0;}
  .col.right{border-left:1px solid var(--hair);padding-left:32px;}
  .field .k{
    font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin-bottom:2px;
  }
  .field .v{font-size:12.5px;line-height:1.42;color:var(--ink-2);}
  .field .v b{font-weight:700;color:var(--ink);}
  sup.cite{font-family:var(--mono);font-size:9px;color:var(--accent);font-weight:700;vertical-align:super;line-height:0;padding-left:1px;}

  .why{display:flex;flex-direction:column;gap:5px;}
  .why .wrow{display:flex;gap:8px;font-size:11.5px;line-height:1.38;color:var(--ink-2);}
  .why .wrow .wn{font-family:var(--mono);font-size:10px;color:var(--accent);font-weight:700;flex:none;padding-top:2px;}
  .why .wrow b{font-weight:700;color:var(--ink);}

  .scale-box{
    background:var(--paper-2);border:1px solid var(--hair);border-left:3px solid var(--accent);
    padding:8px 12px;margin-top:2px;
  }
  .scale-box .k{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);font-weight:700;margin-bottom:2px;}
  .scale-box .v{font-size:11.5px;line-height:1.38;color:var(--ink-2);}
  .scale-box .v b{font-weight:700;color:var(--ink);}

  /* footer block = novelty + sources, in normal flow below the body.
     flex:none reserves their space so the body can never overlap them. */
  .pitch-foot{flex:none;margin-top:8px;}
  .novelty{
    padding-top:7px;
    font-family:var(--mono);font-size:9.5px;line-height:1.38;font-weight:700;color:var(--contra);
    letter-spacing:.01em;
  }
  .novelty.pos{color:var(--good);}
  .sources{
    padding-top:6px;margin-top:6px;border-top:1px dotted var(--hair-2);
    font-family:var(--mono);font-size:8.5px;line-height:1.5;color:var(--slate);
  }
  .sources b{color:var(--accent-deep);font-weight:700;}
  .sources a{color:var(--accent);text-decoration:underline;text-underline-offset:1.5px;}
  .sources i{font-style:italic;}

  /* ===== SHORTLIST ===== */
  .slide--shortlist h2{font-size:34px;font-weight:800;letter-spacing:-.02em;}
  .slide--shortlist .lede{font-size:14.5px;color:var(--slate);margin-top:6px;max-width:90ch;line-height:1.45;}
  .sl-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px;margin-top:22px;flex:1;}
  .sl-card{border:1px solid var(--hair);border-top:3px solid var(--good);padding:14px 18px;background:#fff;display:flex;flex-direction:column;gap:9px;}
  .sl-card .dom{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);font-weight:700;}
  .sl-pick{display:flex;gap:9px;font-size:13px;line-height:1.4;color:var(--ink-2);}
  .sl-pick .nm{font-weight:800;color:var(--ink);white-space:nowrap;}
  .sl-pick .nm .c{color:var(--contra);font-size:9px;vertical-align:super;font-family:var(--mono);}
  .sl-foot{margin-top:14px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--slate);text-align:center;border-top:1px solid var(--hair);padding-top:12px;}

  /* ===== CHROME ===== */
  #chrome{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    display:flex;align-items:center;gap:14px;
    padding:10px 18px;color:#aeb4c0;font-family:var(--mono);font-size:12px;
    pointer-events:none;
  }
  #chrome .nav{pointer-events:auto;display:flex;gap:8px;}
  #chrome button{
    font-family:var(--mono);font-size:13px;background:rgba(255,255,255,.08);color:#dfe3ea;
    border:1px solid rgba(255,255,255,.14);border-radius:4px;width:30px;height:28px;cursor:pointer;
    transition:background .15s;
  }
  #chrome button:hover{background:rgba(255,255,255,.18);}
  #chrome button:focus-visible{outline:2px solid #9db4d8;outline-offset:2px;}
  #counter{letter-spacing:.1em;font-variant-numeric:tabular-nums;}
  #ctitle{color:#7d8492;letter-spacing:.04em;}
  #progress{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:30;transition:width .25s ease;}
  @media (prefers-reduced-motion:reduce){
    #progress{transition:none;}
  }
</style>
</head>

<div id="progress"></div>
<div id="stage"><div id="canvas"></div></div>
<div id="chrome">
  <div class="nav">
    <button id="prev" aria-label="Previous slide">&larr;</button>
    <button id="next" aria-label="Next slide">&rarr;</button>
  </div>
  <span id="counter">01 / 22</span>
  <span id="ctitle"></span>
</div>

<script>
/* ============ DATA ============ */
const DOMAINS = [
  {
    n:"01", name:"Energy Operations in Manufacturing",
    subs:["Process & Asset Intelligence","Grid-Interactive & Flexibility","Carbon-Linked Energy Compliance"],
    backdrop:"AG's steel plants are among Guatemala's largest energy consumers — a live proving ground, real load data, a credible reference customer."
  },
  {
    n:"02", name:"Industrial Freight & Port Congestion",
    subs:["Inland Fleet Reliability & Cargo Security","Freight Working Capital & Payments","Routing, Capacity & Visibility Intelligence"],
    backdrop:"AG is a large regional importer with a network of transport providers — built-in scale, carriers, lanes, and freight spend to seed any venture. (Stays clear of PortClear's ocean/port lane.)"
  },
  {
    n:"03", name:"Industrial Distribution Channel Gaps",
    subs:["Embedded Commerce & Credit at PoS","Last-Mile & Fulfillment","Channel / Dealer Enablement"],
    backdrop:"Existing B2B customer relationships + a retail channel (Distun) give AG a head start over outside entrants. (Scoped away from Veta's demand intelligence.)"
  },
  {
    n:"04", name:"Long-Term Demand Forecasting for Industrials",
    subs:["Strategic Capacity & Capex Planning","Procurement, S&OP & Price Foresight","Macro-Industrial Intelligence"],
    backdrop:"AG's cross-sector transaction/demand data and multi-market vantage (steel, materials, distribution, imports) is the asset an outside startup can't assemble. (Longer-horizon than Veta.)"
  }
];

const PITCHES = [
  /* ---- DOMAIN 1: ENERGY ---- */
  {
    dom:"Energy Ops", sub:"Process & Asset Intelligence", lens:"Analog arbitrage", contra:false,
    name:"KiloWise", one:"An <em>agentic energy-cost copilot</em> that reads existing meters/PLC/SCADA and tells the shift supervisor, in plain Spanish, the cheapest way to run the next 8 hours — no new hardware.",
    customer:"Plant/energy managers & shift supervisors at mid-sized LatAm manufacturers ($20M–$300M rev): food, plastics, textiles, mid-tier metals — too small for a Siemens deployment, too big to fly blind.",
    problem:"Energy is a top-3, rising cost line, but the team only sees it monthly on the bill — after the peak-demand charge is locked. JTBD: run today's production for the least money without stopping the line.",
    product:"Software-only ingestion of existing meter/SCADA data → forecasts daily load + tariff exposure → pushes ranked actions (\"kill idle compressor bank B,\" \"shift the 2pm melt to 9pm\") via WhatsApp/mobile; tracks realized savings.",
    ag:"<b>Domain expertise + load data + reference customer.</b> AG's Guatemalan steel plants give a live high-variance load to train the action engine, plus operators who validate which recommendations are operationally safe. Trained models + playbook travel with the venture; AG access is a head-start, not the moat.",
    why:[
      "<b>Analog with traction:</b> Germany's Ecoplanet raised a €16M Series A (Jan 2025, EQT Ventures); France's METRON has raised ~$55M total across rounds for AI industrial energy management — funded in Europe, largely absent for LatAm mid-market.",
      "<b>Problem size:</b> energy-management programs deliver double-digit % savings in industry (IEA-documented first-year results of ~5–30% across plants) — on a top-3 cost line under sustained tariff pressure in Guatemala.",
      "<b>Catalyst:</b> Cheap LLM agents make a Spanish, mobile-first copilot for non-technical supervisors viable now."
    ],
    scale:"Land in Guatemalan mid-market → replicate market-by-market (Central America, Mexico, Brazil, Andean) → expand from copilot to full energy system-of-record. Tens of thousands of plants × a few $K/mo clears <b>$500M</b>.",
    sources:`<a href="https://www.eu-startups.com/2025/01/germanys-ecoplanet-raises-e16-million-to-help-companies-cut-energy-costs-and-emissions/">EU-Startups. (2025). <i>Ecoplanet raises €16M Series A</i>.</a> · <a href="https://www.iea.org/commentaries/industrial-facilities-could-save-billions-by-implementing-energy-management">IEA. (2024). <i>Industrial facilities could save billions by implementing energy management</i>.</a> · <a href="https://www.mate-solar.com/guatemala-energy-storage-market-2026-the-definitive-technical-commercial-guide-for-industrial-and-commercial-stakeholders/">Mate Solar. (2026). <i>Guatemala energy storage market 2026</i>.</a> [T3]`,
    novelty:"Novelty signal: NEGATIVE — closest analogs (Ecoplanet Series A, METRON multi-round/~$55M) are funded incumbents in the same AI industrial-energy lane, not fresh seed; market is contested, not whitespace."
  },
  {
    dom:"Energy Ops", sub:"Process & Asset Intelligence", lens:"Contrarian + first-principles", contra:true,
    name:"PhantomLoad", one:"Instead of a dashboard, it sells <em>found money</em>: AI disaggregates existing meter data to expose hidden waste and bills only as a <em>share of the savings it proves</em>.",
    customer:"CFOs / plant GMs at energy-intensive LatAm manufacturers — the budget owner who feels the cost line, not the engineer who reads the dashboard.",
    problem:"Manufacturers have been pitched dashboards for a decade and stopped buying — \"another screen no one looks at.\" Real JTBD: cut my bill without staffing an analyst, installing hardware, or trusting a vague promise.",
    product:"Read-only ingestion of interval-meter/SCADA → ML disaggregation (motor current signature, power-quality anomaly — no new sensors) itemizes waste w/ a $ figure + fix → M&V proves the saving → <b>outcome billing: % of verified savings, $0 upfront.</b>",
    ag:"<b>Operational asset + early revenue + M&V credibility.</b> AG steel plants are the ideal first proving ground — huge, messy, sensor-rich load to train disaggregation models and prove savings-share economics on a hostile real load. AG becomes a paying anchor whose verified savings number is the sales proof.",
    why:[
      "<b>Contrarian premise, data-backed:</b> equipment-level analytics now detect critical motor issues without installing additional sensors (Eaton, Apr 2026 software release) — so \"$0 hardware, pay-from-savings\" is technically real now.",
      "<b>Why it wins here:</b> mid-market buyers won't pre-pay for unproven software; outcome pricing removes the barrier that kills EMS SaaS — and motor-system optimization routinely captures 11–18% of motor energy (US DOE).",
      "<b>Problem size:</b> sustained Guatemalan industrial-tariff pressure makes a savings-share offer self-funding and an easy yes."
    ],
    scale:"Savings-share land-and-expand across LatAm energy-intensive verticals → the verified-savings dataset becomes a defensible targeting asset → expand into power-factor, predictive motor failure, demand-charge lines. Price tracks the (large) waste pool — clears <b>$500M</b>.",
    sources:`<a href="https://finance.yahoo.com/sectors/technology/articles/eaton-predictive-maintenance-software-significantly-130000943.html">Eaton (via ACCESS Newswire/Yahoo Finance). (2026). <i>Predictive-maintenance software detects issues without added sensors</i>.</a> [T3, vendor] · <a href="https://www.osti.gov/servlets/purl/1210896">U.S. DOE / Office of Scientific & Technical Information. (n.d.). <i>Improving motor and drive system performance</i>.</a> [T1] · <a href="https://www.mate-solar.com/guatemala-energy-storage-market-2026-the-definitive-technical-commercial-guide-for-industrial-and-commercial-stakeholders/">Mate Solar. (2026). <i>Guatemala energy storage market 2026</i>.</a> [T3]`,
    novelty:"Novelty signal: NEGATIVE — no exact-lane seed twin, but the pay-from-savings M&V space is mature-to-scarred (Redaptive ~$1B+ raised; Carbon Lighthouse wound down; Sealed pivoted). Differentiate hard on sensor-free, software-only disaggregation."
  },
  {
    dom:"Energy Ops", sub:"Grid-Interactive & Flexibility", lens:"Catalyst + asset-first", contra:false,
    name:"FlexWatt", one:"Software that aggregates industrial load flexibility (+ on-site gensets/batteries) into a virtual resource — <em>avoiding peak charges today, earning grid/balancing revenue</em> as LatAm markets open.",
    customer:"Energy-intensive plants with shiftable load or on-site generation (smelters, cold storage, cement, large food/bev) — first as peak-shaving, evolving into a demand-response fleet.",
    problem:"Plants pay large peak-demand charges and sit on idle backup generation + shiftable processes that are economically dormant. Today: stop overpaying the few peak hours that set my charge. Tomorrow: get paid to flex.",
    product:"Software-only orchestration over existing meters, gensets, controllable loads → forecasts demand-charge exposure, dispatches load-shift/curtailment automatically → bids aggregated flexibility into wholesale/balancing markets as they open. Starts as cost-avoidance (no regulatory dependency), graduates to revenue.",
    ag:"<b>Operational asset + convening power + regulatory posture.</b> AG's plants are exactly the large flexible generation-backed loads FlexWatt needs as anchor node; AG's standing as a top consumer gets a seat with the regulator and market operator (AMM) a startup can't get cold, and convenes other industrials into the first pool.",
    why:[
      "<b>Analog with traction:</b> Enel X runs a large C&I demand-response business (~9.3 GW managed); Voltus is an active private DR aggregator; Sympower raised a €19M Series B extension (Sept 2025, ~€42M total Series B) for industrial flexibility — proven, under-built in LatAm.",
      "<b>Market growth:</b> DR aggregator market ~$2.14B (2024) → ~$6.53B by 2033 at ~15.7% CAGR; Stem Inc. announced South America's first VPP in Chile (2021) — early but real LatAm activity.",
      "<b>Catalyst:</b> Guatemala runs a mature 15+yr auction-based wholesale market — PEG-5 drew 51 bidders for ~4.7 GW and awarded ~1,505 MW (concluded early 2026) — unusually liquid infrastructure to plug flexibility into."
    ],
    scale:"Peak-shaving (works day one, regulation-agnostic) builds the installed base → flip to revenue VPP as each market opens DR programs → aggregated MW under management is the asset, monetized per-MW across geographies. Region-by-region replication of a ~15.7%-CAGR market clears <b>$500M</b>.",
    sources:`<a href="https://www.eu-startups.com/2025/09/amsterdams-sympower-raises-additional-e42-million-funding-to-drive-europes-energy-transition/">EU-Startups. (2025). <i>Sympower raises additional €42M to drive Europe's energy transition</i>.</a> · <a href="https://www.enelnorthamerica.com/solutions/energy-solutions/demand-response">Enel X / Enel North America. (n.d.). <i>Demand response (~9.3 GW managed)</i>.</a> [T2] · <a href="https://dataintelo.com/report/demand-response-aggregator-market">DataIntelo. (n.d.). <i>Demand response aggregator market</i>.</a> [T3] · <a href="https://www.pv-magazine.com/2026/02/17/guatemala-peg-5-tender-draws-51-bidders-for-4-7-gw-of-capacity/">pv magazine. (2026). <i>Guatemala PEG-5 tender draws 51 bidders for 4.7 GW</i>.</a> [T2]`,
    novelty:"Novelty signal: NEGATIVE — all three closest analogs (Sympower Series B+, Voltus, Enel X) are scaling/incumbent DR aggregators with direct solution overlap; the LatAm geography is the only fresh angle, not the model."
  },
  {
    dom:"Energy Ops", sub:"Carbon-Linked Energy Compliance", lens:"Catalyst + value-chain re-cut", contra:false,
    name:"CarbonLedger", one:"Turns a manufacturer's existing energy/process data into <em>auditable, product-level carbon footprints</em> — so LatAm exporters satisfy EU CBAM without a consultant army.",

const slides = [];
function add(html, title){ slides.push({html, title}); }

/* inject */
cv.innerHTML = slides.map((s,i)=>s.html.replace('class="slide','class="slide'+(i===0?' active':''))).join("");
const els = Array.from(cv.querySelectorAll('.slide'));
let idx = 0;
const counter = document.getElementById('counter');
const ctitle = document.getElementById('ctitle');
const prog = document.getElementById('progress');

function pad(n){return String(n).padStart(2,'0');}
function show(i){
  idx = Math.max(0, Math.min(els.length-1, i));
  els.forEach((e,k)=>e.classList.toggle('active', k===idx));
  counter.textContent = pad(idx+1)+' / '+pad(els.length);
  ctitle.textContent = slides[idx].title;
  prog.style.width = ((idx)/(els.length-1)*100)+'%';
}
function next(){show(idx+1);}
function prev(){show(idx-1);}

document.getElementById('next').addEventListener('click', next);
document.getElementById('prev').addEventListener('click', prev);
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
  else if(e.key==='Home'){e.preventDefault();show(0);}
  else if(e.key==='End'){e.preventDefault();show(els.length-1);}
});

/* auto-scale 1280x720 to viewport */
function scale(){
  const m = 24;
  const s = Math.min((window.innerWidth-m*2)/1280, (window.innerHeight-m*2)/720);
  cv.style.transform = 'scale('+s+')';
}
window.addEventListener('resize', scale);
scale();
show(0);
</script>
